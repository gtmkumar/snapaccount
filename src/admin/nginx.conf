# nginx config for SnapAccount React admin SPA
# Serves on PORT env var (default 8080) as non-root

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SEC-025: HTTP-to-HTTPS redirect
    # Cloud Run terminates TLS at the load balancer level. The container itself
    # only receives HTTP on port 8080 — the load balancer sets X-Forwarded-Proto.
    # Because Cloud Run never sends plain HTTP to the container, a separate listen 80
    # block is not used here. The redirect is enforced at the load balancer and via
    # HSTS (see Strict-Transport-Security header below).
    #
    # If direct HTTP access to this container is ever possible (e.g. local dev or
    # a future non-GCP deployment), enable the block below:
    #
    # server {
    #     listen 80;
    #     server_name _;
    #     # Honour the forwarded proto so health check calls from GCP pass through
    #     if ($http_x_forwarded_proto = "http") {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint for Cloud Run / Docker
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # React Router — serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com wss:;" always;
        # SEC-025: HSTS — instructs browsers to enforce HTTPS for 1 year including subdomains.
        # preload: submits the domain to browser preload lists (only enable once HTTPS is stable).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
