# SnapAccount — Docker Compose Dev Overrides
# Applied automatically alongside docker-compose.yml during local development.
# Enables: hot-reload volumes, debug ports, relaxed health checks, verbose logging.
#
# Do NOT commit real secrets — use .env for local values.

version: "3.9"

services:

  postgres:
    # Expose postgres metrics port for local pgAdmin / DBeaver connections
    ports:
      - "5432:5432"
    # Extra init SQL for dev: create all schemas + enable pgvector
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/dev-seed:/docker-entrypoint-initdb.d/seed:ro

  # ── Dev overrides for all backend services ──
  # Hot reload via `dotnet watch` — mount source code as volume.
  # Each service gets a debug port (50001+N).

  auth-service:
    build:
      target: build           # stop at build stage — no publish/runtime stage needed for watch
      args:
        SERVICE_NAME: AuthService
    command: ["dotnet", "watch", "--project", "src/AuthService/AuthService.csproj", "run", "--no-launch-profile"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Information
    volumes:
      - ./backend:/src
      - ${HOME}/.nuget/packages:/root/.nuget/packages:ro
    ports:
      - "5001:8080"
      - "50001:50001"  # debug port
    healthcheck:
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 5

  document-service:
