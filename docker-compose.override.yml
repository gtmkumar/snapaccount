  # ── React Admin — Vite dev server (hot reload) ──
  admin-panel:
    build:
      context: ./src/admin
      dockerfile: Dockerfile
      target: deps   # just install deps; Vite handles serving
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:5001
    volumes:
      - ./src/admin:/app
      - /app/node_modules   # anonymous volume to prevent host override of node_modules
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
