# SnapAccount — Docker Compose Dev Overrides
# Applied automatically alongside docker-compose.yml during local development.

version: "3.9"

services:

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/dev-seed/100_dev_users.sql:/docker-entrypoint-initdb.d/100_dev_users.sql:ro
      - ./database/dev-seed/200_dev_business_data.sql:/docker-entrypoint-initdb.d/200_dev_business_data.sql:ro

  platform-service:
    build:
      target: build
      args:
        COMPOSITE_NAME: Platform
    command: ["dotnet", "watch", "--project", "Services/PlatformService/Platform.WebApi/Platform.WebApi.csproj", "run", "--no-launch-profile", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Information
    volumes:
      - ./backend:/src
      - ${HOME}/.nuget/packages:/root/.nuget/packages:ro
    ports:
      - "5201:8080"
    healthcheck:
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 5

  finance-service:
    build:
      target: build
      args:
        COMPOSITE_NAME: Finance
    command: ["dotnet", "watch", "--project", "Services/FinanceService/Finance.WebApi/Finance.WebApi.csproj", "run", "--no-launch-profile", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Debug
    volumes:
      - ./backend:/src
      - ${HOME}/.nuget/packages:/root/.nuget/packages:ro
    ports:
      - "5202:8080"
    healthcheck:
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 5

  assist-service:
    build:
      target: build
      args:
        COMPOSITE_NAME: Assist
    command: ["dotnet", "watch", "--project", "Services/AssistService/Assist.WebApi/Assist.WebApi.csproj", "run", "--no-launch-profile", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Debug
    volumes:
      - ./backend:/src
      - ${HOME}/.nuget/packages:/root/.nuget/packages:ro
    ports:
      - "5203:8080"
    healthcheck:
      interval: 60s
      timeout: 30s
      start_period: 60s
      retries: 5

  admin-panel:
    build:
      context: ./src/admin
      dockerfile: Dockerfile
      target: deps
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:5201
    volumes:
      - ./src/admin:/app
      - /app/node_modules
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
