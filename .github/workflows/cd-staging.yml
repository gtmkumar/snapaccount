# SnapAccount — Continuous Deployment to Staging
# Triggered on push to `develop` branch.
# Flow: Build Docker images → Push to Artifact Registry → Deploy to Cloud Run (staging).
#
# Authentication: GitHub OIDC → GCP Workload Identity Federation (keyless — no SA keys).

name: CD Staging

on:
  push:
    branches:
      - develop

concurrency:
  group: cd-staging
  cancel-in-progress: false   # don't cancel in-flight staging deploys

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev
  REGISTRY_REPO: snapaccount/services
  ENVIRONMENT: staging
  CLOUD_RUN_SUFFIX: -staging

permissions:
  contents: read
  id-token: write   # OIDC token for keyless GCP auth

jobs:

  # ─────────────────────────────────────────────
  # Job 0: GCP configuration gate
  # The repo has no GCP OIDC vars until infra is provisioned (TL-gated —
  # see infra/README.md). Without this gate every push turned the run red at
  # google-github-actions/auth. Deploy jobs are skipped (not failed) until
  # GCP_WORKLOAD_IDENTITY_PROVIDER is set as a repository variable.
  # ─────────────────────────────────────────────
  gcp-config-check:
    name: GCP Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Report GCP OIDC configuration status
        run: |
          if [ -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "GCP OIDC is configured — deployment jobs will run."
          else
            echo "::notice title=Staging deploy skipped::GCP OIDC is not configured (repo variable GCP_WORKLOAD_IDENTITY_PROVIDER is unset). Build & deploy jobs were skipped, not failed. Provision GCP infra per infra/README.md to enable CD."
            {
              echo "### Staging deploy skipped"
              echo "GCP OIDC is not configured (\`GCP_WORKLOAD_IDENTITY_PROVIDER\` repo variable is unset)."
              echo "Provision GCP infra per \`infra/README.md\` to enable deployments."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────
  # Job 1: Resolve image tag
  # ─────────────────────────────────────────────
  prepare:
    name: Prepare Build Context
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="staging-${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

  # ─────────────────────────────────────────────
  # Job 2: Authenticate & build all service images
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: prepare
    # Skip (don't fail) until GCP OIDC is provisioned — see gcp-config-check.
    if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: Platform
            cloud_run_name: platform-service
          - name: Finance
            cloud_run_name: finance-service
          - name: Assist
            cloud_run_name: assist-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          build-args: COMPOSITE_NAME=${{ matrix.service.name }}
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ matrix.service.cloud_run_name }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ matrix.service.cloud_run_name }}:staging-latest
          cache-from: type=gha,scope=${{ matrix.service.name }}-staging
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-staging
          labels: |
            git.sha=${{ github.sha }}
            git.ref=${{ github.ref }}
            build.environment=staging
            build.timestamp=${{ github.event.head_commit.timestamp }}

  # ── DG-INFRA-01: API Gateway build + push (staging) ────────────────────────
  build-push-gateway:
    name: Build & Push — API Gateway
    runs-on: ubuntu-latest
    needs: prepare
    # Skip (don't fail) until GCP OIDC is provisioned — see gcp-config-check.
    if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/api-gateway:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/api-gateway:staging-latest
          cache-from: type=gha,scope=api-gateway-staging
          cache-to: type=gha,mode=max,scope=api-gateway-staging
          labels: |
            git.sha=${{ github.sha }}
            git.ref=${{ github.ref }}
            build.environment=staging

  # ─────────────────────────────────────────────
  # Job 3: Build & push React Admin
  # ─────────────────────────────────────────────
  build-push-admin:
    name: Build & Push — Admin Panel
    runs-on: ubuntu-latest
    needs: prepare
    # Skip (don't fail) until GCP OIDC is provisioned — see gcp-config-check.
    if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Firebase config from Secret Manager (staging)
        id: firebase_config
        run: |
          echo "FIREBASE_WEB_API_KEY=$(gcloud secrets versions access latest --secret=firebase-web-api-key-staging)" >> "$GITHUB_ENV"
          echo "FIREBASE_AUTH_DOMAIN=$(gcloud secrets versions access latest --secret=firebase-auth-domain)" >> "$GITHUB_ENV"
          echo "FIREBASE_APP_ID=$(gcloud secrets versions access latest --secret=firebase-web-app-id-staging)" >> "$GITHUB_ENV"

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./src/admin
          file: ./src/admin/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://api-staging.snapaccount.in
            VITE_FIREBASE_API_KEY=${{ env.FIREBASE_WEB_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ env.FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_APP_ID=${{ env.FIREBASE_APP_ID }}
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/admin-panel:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/admin-panel:staging-latest
          cache-from: type=gha,scope=admin-panel-staging
          cache-to: type=gha,mode=max,scope=admin-panel-staging

  # ─────────────────────────────────────────────
  # Job 4: Run database migrations (staging)
  # ─────────────────────────────────────────────
  run-migrations:
    name: Run DB Migrations (Staging)
    runs-on: ubuntu-latest
    needs: [build-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run migration Cloud Run Job (staging)
        run: |
          gcloud run jobs execute snapaccount-db-migrate-staging \
            --region=${{ env.GCP_REGION }} \
            --wait \
            --format="json"

  # ─────────────────────────────────────────────
  # Job 5: Deploy all services to Cloud Run (staging)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Cloud Run — ${{ matrix.service.cloud_run_name }}-staging
    runs-on: ubuntu-latest
    needs: [prepare, build-push, run-migrations]

    strategy:
      fail-fast: false
      matrix:
        service:
          - cloud_run_name: platform-service
            sa: platform-service-sa
            port: 8080
            memory: 512Mi
          - cloud_run_name: finance-service
            sa: finance-service-sa
            port: 8080
            memory: 1Gi
          - cloud_run_name: assist-service
            sa: assist-service-sa
            port: 8080
            memory: 1Gi

    steps:
      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ matrix.service.cloud_run_name }}-staging
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ matrix.service.cloud_run_name }}:${{ needs.prepare.outputs.image_tag }}
          region: ${{ env.GCP_REGION }}
          service_account: ${{ matrix.service.sa }}@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          flags: >-
            --port=${{ matrix.service.port }}
            --min-instances=0
            --max-instances=3
            --concurrency=80
            --cpu=1
            --memory=${{ matrix.service.memory }}
            --vpc-connector=snapaccount-vpc-connector
            --vpc-egress=private-ranges-only
            --ingress=internal-and-cloud-load-balancing
            --no-allow-unauthenticated
            --set-secrets=ASPNETCORE_DB_CONNECTION=db-connection-string-staging:latest,ASPNETCORE_REDIS_CONNECTION=redis-connection-string-staging:latest
            --update-labels=environment=staging,git-sha=${{ needs.prepare.outputs.short_sha }}

  # ── DG-INFRA-01: Deploy API Gateway (staging) ──────────────────────────────
  deploy-gateway-staging:
    name: Deploy API Gateway (staging)
    runs-on: ubuntu-latest
    needs: [prepare, build-push-gateway, build-push]

    steps:
      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API Gateway to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: api-gateway-staging
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/api-gateway:${{ needs.prepare.outputs.image_tag }}
          region: ${{ env.GCP_REGION }}
          flags: >-
            --port=8080
            --min-instances=0
            --max-instances=2
            --concurrency=200
            --cpu=1
            --memory=256Mi
            --vpc-connector=snapaccount-vpc-connector
            --vpc-egress=private-ranges-only
            --ingress=all
            --no-allow-unauthenticated
            --set-env-vars=ASPNETCORE_ENVIRONMENT=Staging,ReverseProxy__Clusters__platform__Destinations__platform__Address=https://platform-service-staging,ReverseProxy__Clusters__finance__Destinations__finance__Address=https://finance-service-staging,ReverseProxy__Clusters__assist__Destinations__assist__Address=https://assist-service-staging
            --update-labels=environment=staging,git-sha=${{ needs.prepare.outputs.short_sha }},role=gateway

  deploy-admin-staging:
    name: Deploy Admin Panel to Cloud Run (staging)
    runs-on: ubuntu-latest
    needs: [prepare, build-push-admin]

    steps:
      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy admin panel to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: admin-panel-staging
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/admin-panel:${{ needs.prepare.outputs.image_tag }}
          region: ${{ env.GCP_REGION }}
          flags: >-
            --port=8080
            --min-instances=0
            --max-instances=2
            --concurrency=100
            --cpu=1
            --memory=256Mi
            --ingress=all
            --allow-unauthenticated
            --update-labels=environment=staging,git-sha=${{ needs.prepare.outputs.short_sha }}

  notify-staging:
    name: Notify Staging Deployment
    runs-on: ubuntu-latest
    # prepare included so needs.prepare.outputs.image_tag below actually resolves
    # (a job only sees outputs of jobs listed in its needs).
    needs: [prepare, deploy-staging, deploy-gateway-staging, deploy-admin-staging]
    if: always() && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

    steps:
      - name: Deployment summary
        run: |
          echo "### Staging Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image tag:** ${{ needs.prepare.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Git SHA:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region:** ${{ env.GCP_REGION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ needs.deploy-staging.result }}" >> "$GITHUB_STEP_SUMMARY"
