# SnapAccount — Local Development Docker Compose
# 3 composite services (Platform / Finance / Assist) + React Admin + PostgreSQL 17 + Redis
#
# Quick start:
#   cp .env.example .env   # fill in your local values
#   docker compose up -d
#
# Ports: Platform :5201, Finance :5202, Assist :5203, Admin :3000

version: "3.9"

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: snapaccount-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: snapaccount
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgresql}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snapaccount"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: snapaccount-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # ── Platform: Auth + Subscription + Notification (:5201) ──
  platform-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        COMPOSITE_NAME: Platform
    container_name: snapaccount-platform
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      REDIS_CONNECTION_STRING: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
      Msg91__ApiKey: ${MSG91_API_KEY}
      Razorpay__KeyId: ${RAZORPAY_KEY_ID}
      Razorpay__KeySecret: ${RAZORPAY_KEY_SECRET}
      SendGrid__ApiKey: ${SENDGRID_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      PUBSUB_TOPIC_PREFIX: snapaccount
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}
      LOCAL_AUTH: ${LOCAL_AUTH:-true}
    ports:
      - "5201:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  # ── Finance: Document + Accounting + GST + Loan + ITR + Report (:5202) ──
  finance-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        COMPOSITE_NAME: Finance
    container_name: snapaccount-finance
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      GoogleCloud__ProjectId: ${GCP_PROJECT_ID}
      GoogleCloud__StorageBucket: ${GCS_BUCKET_NAME:-snapaccount-documents-local}
      GoogleDocumentAi__ProcessorId: ${DOCUMENT_AI_PROCESSOR_ID}
      GstPortal__BaseUrl: ${GST_PORTAL_URL:-https://api.gst.gov.in}
      GstPortal__ClientId: ${GST_PORTAL_CLIENT_ID}
      NicEInvoice__BaseUrl: ${NIC_EINVOICE_URL:-https://einvoice1.gst.gov.in}
      ItPortal__BaseUrl: ${IT_PORTAL_URL:-https://efileapi.incometax.gov.in}
      GCS_LOAN_PACKAGES_BUCKET: ${GCS_LOAN_PACKAGES_BUCKET:-snapaccount-loan-packages-dev}
      GCS_BUCKET_ITR: ${GCS_BUCKET_ITR:-snapaccount-itr-dev}
      GCS_REPORTS_BUCKET: ${GCS_REPORTS_BUCKET:-snapaccount-reports-dev}
      ServiceUrls__GstService: http://finance-service:8080
      ServiceUrls__AccountingService: http://finance-service:8080
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      PUBSUB_TOPIC_PREFIX: snapaccount
      GST_PRODUCTION_APIS_ENABLED: ${GST_PRODUCTION_APIS_ENABLED:-false}
    ports:
      - "5202:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  # ── Assist: Chat + AI + Callback (:5203) ──
  assist-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        COMPOSITE_NAME: Assist
    container_name: snapaccount-assist
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      REDIS_CONNECTION_STRING: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      SignalR__BackplaneConnection: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      GoogleCloud__ProjectId: ${GCP_PROJECT_ID}
      VertexAi__Location: ${VERTEX_AI_LOCATION:-asia-south1}
      VertexAi__ModelId: ${VERTEX_AI_MODEL:-gemini-1.5-pro}
      SarvamAi__ApiKey: ${SARVAM_AI_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      PUBSUB_TOPIC_PREFIX: snapaccount
    ports:
      - "5203:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  # ── API Gateway: YARP reverse proxy (:5000 → composites) ──
  # Routes: /auth/* → platform-service, /documents/* → finance-service, /chat/* → assist-service, etc.
  # appsettings.json cluster addresses are overridden via ReverseProxy__Clusters__* env vars so
  # the gateway can reach the other containers by their Docker Compose service names.
  # VITE_API_BASE_URL in admin-panel should point here (:5000) in container environments;
  # for local bare-metal dev the Aspire AppHost maps the gateway to :6060.
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    container_name: snapaccount-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # YARP cluster destinations — override the Aspire service-discovery addresses with
      # Docker Compose service names so containers can reach each other.
      ReverseProxy__Clusters__platform__Destinations__platform__Address: http://platform-service:8080
      ReverseProxy__Clusters__finance__Destinations__finance__Address: http://finance-service:8080
      ReverseProxy__Clusters__assist__Destinations__assist__Address: http://assist-service:8080
      # Rate limiting: disable in local dev to avoid throttling rapid test loops
      RateLimiting__Enabled: "false"
    ports:
      - "5000:8080"
    depends_on:
      platform-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      assist-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - frontend

  admin-panel:
    build:
      context: ./src/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
        VITE_FIREBASE_API_KEY: ${FIREBASE_WEB_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID: ${FIREBASE_WEB_APP_ID}
    container_name: snapaccount-admin
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - backend
