# SnapAccount — Local Development Docker Compose
# All 11 .NET microservices + React Admin + PostgreSQL 17 + Redis
# Service names match .NET Aspire service discovery names.
#
# Quick start:
#   cp .env.example .env   # fill in your local values
#   docker compose up -d
#
# pgvector extension is initialised by the db-init service on first run.

version: "3.9"

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────
services:

  # ── Infrastructure ────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: snapaccount-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: snapaccount
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgresql}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snapaccount"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: snapaccount-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # ── .NET Microservices ─────────────────────
  # Each service uses SERVICE_NAME build arg to select the correct entry point.
  # All share the same Dockerfile in backend/.

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AuthService
    container_name: snapaccount-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=auth"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
      Msg91__ApiKey: ${MSG91_API_KEY}
      Jwt__SecretKey: ${JWT_SECRET_KEY:-change-me-in-production-min-32-chars}
      Jwt__Issuer: snapaccount
      Jwt__Audience: snapaccount-clients
      SERVICE_NAME: AuthService
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  document-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: DocumentService
    container_name: snapaccount-document
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=document"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      GoogleCloud__ProjectId: ${GCP_PROJECT_ID}
      GoogleCloud__StorageBucket: ${GCS_BUCKET_NAME:-snapaccount-documents-local}
      GoogleDocumentAi__ProcessorId: ${DOCUMENT_AI_PROCESSOR_ID}
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: DocumentService
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  accounting-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: AccountingService
