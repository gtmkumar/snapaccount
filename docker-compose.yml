      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=accounting"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: AccountingService
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
