  gst-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: GstService
    container_name: snapaccount-gst
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=gst"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      GstPortal__BaseUrl: ${GST_PORTAL_URL:-https://api.gst.gov.in}
      GstPortal__ClientId: ${GST_PORTAL_CLIENT_ID}
      NicEInvoice__BaseUrl: ${NIC_EINVOICE_URL:-https://einvoice1.gst.gov.in}
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: GstService
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  loan-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: LoanService
    container_name: snapaccount-loan
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=loan"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: LoanService
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  itr-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ItrService
    container_name: snapaccount-itr
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=itr"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      ItPortal__BaseUrl: ${IT_PORTAL_URL:-https://efileapi.incometax.gov.in}
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: ItrService
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  chat-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ChatService
    container_name: snapaccount-chat
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=chat"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      SignalR__BackplaneConnection: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      PubSub__TopicPrefix: snapaccount
      SERVICE_NAME: ChatService
    ports:
      - "5007:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: NotificationService
    container_name: snapaccount-notification
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=snapaccount;Username=postgres;Password=${POSTGRES_PASSWORD:-postgresql};Search Path=notification"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redispassword}"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
      Msg91__ApiKey: ${MSG91_API_KEY}
      SendGrid__ApiKey: ${SENDGRID_API_KEY}
      PubSub__TopicPrefix: snapaccount
      Features__WhatsAppEnabled: "false"
      SERVICE_NAME: NotificationService
    ports:
      - "5008:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
